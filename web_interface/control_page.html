<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESP32 Robot Car</title>

<style>
body {
  margin: 0;
  background-color: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
}
.container { display: flex; height: 100vh; }
.controls {
  width: 30%;
  min-width: 220px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 25px;
}
.dpad {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  grid-template-rows: repeat(3, 80px);
  gap: 14px;
}
button {
  width: 80px;
  height: 80px;
  font-size: 32px;
  border: none;
  border-radius: 50%;
  cursor: pointer;
}
.forward { background:#22c55e; }
.backward { background:#ef4444; }
.left { background:#3b82f6; }
.right { background:#facc15; color:black; }

.moisture {
  width: 200px;
  height: 55px;
  font-size: 18px;
  border-radius: 30px;
  background-color: #a855f7;
  color: white;
}

.right-panel {
  width: 70%;
  display: flex;
  flex-direction: column;
}
.camera {
  height: 50%;
  background: black;
}
.moisture-display {
  height: 50%;
  background-color: #020617;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.moisture-value {
  font-size: 48px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="controls">

  <div class="dpad">
    <div></div>
    <button class="forward" onmousedown="sendCmd('forward')" onmouseup="sendCmd('stop')">↑</button>
    <div></div>

    <button class="left" onmousedown="sendCmd('left')" onmouseup="sendCmd('stop')">←</button>
    <div></div>
    <button class="right" onmousedown="sendCmd('right')" onmouseup="sendCmd('stop')">→</button>

    <div></div>
    <button class="backward" onmousedown="sendCmd('backward')" onmouseup="sendCmd('stop')">↓</button>
    <div></div>
  </div>

  <button class="moisture" onclick="getMoisture()">Check Moisture</button>

</div>

<div class="right-panel">
  <div class="camera">
    <img src="http://192.168.4.2:8080/video" width="100%" height="100%">
  </div>

  <div class="moisture-display">
    <h2>Soil Moisture Level</h2>
    <div id="moistureValue" class="moisture-value">--%</div>
  </div>
</div>

</div>

<script>
function sendCmd(cmd) {
  fetch("http://192.168.4.1/" + cmd);
}

function getMoisture() {
  const display = document.getElementById("moistureValue");
  display.innerText = "Measuring...";
  display.style.color = "#a855f7";

  fetch("http://192.168.4.1/moisture");

  const poll = setInterval(() => {
    fetch("http://192.168.4.1/moisture")
      .then(res => res.text())
      .then(data => {
        if (data !== "MEASURING") {
          clearInterval(poll);
          let value = parseInt(data);
          display.innerText = value + "%";
          display.style.color =
            value < 30 ? "#ef4444" :
            value < 60 ? "#facc15" : "#22c55e";
        }
      });
  }, 1000);
}
</script>

</body>
</html>
